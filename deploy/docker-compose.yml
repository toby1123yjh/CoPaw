# Build and run the CoPaw Docker image from source.
# Usage: cd deploy && docker compose up --build
services:
  copaw:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "127.0.0.1:8088:8088"
    volumes:
      - copaw-data:/app/working
      - copaw-secrets:/app/working.secret
    restart: unless-stopped

volumes:
  copaw-data:
  copaw-secrets:
